services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ido-backend
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REMEMBER_EXPIRES: ${JWT_REMEMBER_EXPIRES:-30d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      DB_PATH: /app/storage/database/documents.db
      UPLOAD_DIR: /app/storage/uploads
      DOCUMENTS_DIR: /app/storage/documents
      PYTHON_PATH: /app/python/document_ai.py
      PYTHON_COMMAND: python3
    volumes:
      - ./storage:/app/storage
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ido-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
